apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: productivity-island-backend
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Scale up when each instance is handling 10 concurrent connections
        autoscaling.knative.dev/target: "10"
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 10
      timeoutSeconds: 3600        # keep WebSocket connections alive up to 1 hour
      containers:
        - image: IMAGE_PLACEHOLDER  # replaced by deploy script
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: mongo-url
                  key: latest
