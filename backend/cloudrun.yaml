apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: productivity-island-backend
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Each instance handles up to 50 concurrent WebSocket connections (~10 full rooms of 5)
        autoscaling.knative.dev/target: "50"
        autoscaling.knative.dev/minScale: "0"
        # All players in a room MUST land on the same instance because room
        # state is held in-memory in routes/ws_routes.py:RoomManager. Pinning
        # maxScale to 1 forces every WebSocket onto the single live instance,
        # which is what makes multiplayer actually work today.
        # Proper horizontal scaling requires Redis pub/sub (future work).
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/execution-environment: gen2
        # Session affinity: sticks a client to the same instance after first connection.
        # Helps but is not sufficient alone — players connecting fresh may still split.
        run.googleapis.com/sessionAffinity: "true"
    spec:
      containerConcurrency: 50
      timeoutSeconds: 3600        # keep WebSocket connections alive up to 1 hour
      containers:
        - image: IMAGE_PLACEHOLDER  # replaced by deploy script
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: mongo-url
                  key: latest
            - name: WEBHOOK_URL
              value: "https://productivity-island-backend-lbi4hsm5aa-uc.a.run.app"
