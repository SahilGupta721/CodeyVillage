<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0d1117"/>

  <!-- Stars -->
  <rect x="8"  y="6"  width="2" height="2" fill="#fff8c0"/>
  <rect x="50" y="5"  width="2" height="2" fill="#fff8c0"/>
  <rect x="34" y="9"  width="2" height="2" fill="#fff8c0"/>
  <rect x="18" y="12" width="2" height="2" fill="#c8e0ff" opacity="0.7"/>

  <!-- Ground -->
  <rect x="0" y="48" width="64" height="16" fill="#2a5c10"/>
  <rect x="0" y="46" width="64" height="4"  fill="#3a8018"/>
  <rect x="0" y="44" width="64" height="3"  fill="#54b030"/>

  <!-- House shadow -->
  <rect x="17" y="28" width="34" height="20" fill="#3a200a" opacity="0.3"/>

  <!-- House body -->
  <rect x="15" y="26" width="32" height="20" fill="#c8844a"/>
  <!-- Right side darker face -->
  <rect x="43" y="26" width="4"  height="20" fill="#8a5a30"/>

  <!-- Roof tier 4 (bottom) -->
  <rect x="11" y="22" width="40" height="6"  fill="#8a3010"/>
  <rect x="11" y="22" width="40" height="2"  fill="#b04818"/>
  <!-- Roof tier 3 -->
  <rect x="15" y="17" width="32" height="7"  fill="#8a3010"/>
  <rect x="15" y="17" width="32" height="2"  fill="#b04818"/>
  <!-- Roof tier 2 -->
  <rect x="20" y="13" width="22" height="6"  fill="#8a3010"/>
  <rect x="20" y="13" width="22" height="2"  fill="#b04818"/>
  <!-- Roof tier 1 (top) -->
  <rect x="26" y="10" width="10" height="5"  fill="#8a3010"/>
  <rect x="26" y="10" width="10" height="2"  fill="#b04818"/>

  <!-- Chimney -->
  <rect x="40" y="6"  width="6" height="12" fill="#6a3820"/>
  <rect x="41" y="7"  width="4" height="10" fill="#8a4828"/>
  <!-- Chimney smoke -->
  <rect x="38" y="4"  width="4" height="3"  fill="#778" opacity="0.6"/>
  <rect x="42" y="2"  width="4" height="3"  fill="#889" opacity="0.5"/>

  <!-- Left window (glowing code window) -->
  <rect x="16" y="29" width="13" height="11" fill="#0a1628"/>
  <rect x="17" y="30" width="11" height="9"  fill="#0d2040"/>
  <!-- Window glow -->
  <rect x="17" y="30" width="11" height="9"  fill="#40aaff" opacity="0.12"/>
  <!-- Code: >_ in green -->
  <rect x="19" y="32" width="2" height="2"   fill="#40ff80"/>
  <rect x="21" y="33" width="2" height="2"   fill="#40ff80"/>
  <rect x="19" y="34" width="2" height="2"   fill="#40ff80"/>
  <rect x="23" y="35" width="3" height="2"   fill="#40ff80"/>
  <rect x="26" y="35" width="1" height="2"   fill="#40ff80" opacity="0.5"/>
  <!-- Window frame -->
  <rect x="16" y="29" width="13" height="2"  fill="#3a2010"/>
  <rect x="16" y="29" width="2"  height="11" fill="#3a2010"/>
  <rect x="27" y="29" width="2"  height="11" fill="#3a2010"/>
  <rect x="16" y="38" width="13" height="2"  fill="#3a2010"/>
  <!-- Cross bar -->
  <rect x="22" y="29" width="1"  height="11" fill="#3a2010"/>
  <rect x="16" y="34" width="13" height="1"  fill="#3a2010"/>

  <!-- Door -->
  <rect x="30" y="34" width="10" height="12" fill="#2a1208"/>
  <rect x="31" y="35" width="8"  height="10" fill="#4a2810"/>
  <!-- Door panels -->
  <rect x="32" y="36" width="6"  height="3"  fill="#3a2010"/>
  <rect x="32" y="40" width="6"  height="4"  fill="#3a2010"/>
  <!-- Doorknob -->
  <rect x="37" y="39" width="2"  height="2"  fill="#c8902a"/>

  <!-- Ground details -->
  <rect x="4"  y="46" width="4"  height="2"  fill="#60c028" opacity="0.6"/>
  <rect x="54" y="46" width="4"  height="2"  fill="#60c028" opacity="0.6"/>
  <rect x="12" y="45" width="2"  height="2"  fill="#70d030" opacity="0.5"/>
</svg>
